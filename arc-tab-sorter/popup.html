<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>Arc Tab Sorter</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      width: 380px;
      max-height: 560px;
      display: flex;
      flex-direction: column;
      font: 13px -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
    }
    header {
      padding: 10px 12px;
      border-bottom: 1px solid color-mix(in srgb, currentColor 12%, transparent);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .title-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .title-row h1 {
      margin: 0;
      font-size: 13px;
      font-weight: 600;
    }
    .meta {
      font-size: 11px;
      color: color-mix(in srgb, currentColor 55%, transparent);
    }
    input[type="search"] {
      width: 100%;
      padding: 6px 10px;
      border: 1px solid color-mix(in srgb, currentColor 18%, transparent);
      border-radius: 6px;
      background: color-mix(in srgb, currentColor 4%, transparent);
      color: inherit;
      font-size: 12px;
      outline: none;
    }
    input[type="search"]:focus {
      border-color: #2f6fed;
    }
    .list {
      overflow-y: auto;
      flex: 1;
      padding: 4px 0;
    }
    .group-header {
      padding: 8px 12px 4px;
      font-size: 11px;
      font-weight: 600;
      color: color-mix(in srgb, currentColor 70%, transparent);
      letter-spacing: 0.02em;
      position: sticky;
      top: 0;
      background: Canvas;
      backdrop-filter: blur(8px);
    }
    .group-header .count {
      font-weight: 400;
      color: color-mix(in srgb, currentColor 45%, transparent);
      margin-left: 4px;
    }
    .tab-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      cursor: pointer;
      border: 0;
      background: none;
      width: 100%;
      text-align: left;
      color: inherit;
      font: inherit;
    }
    .tab-row:hover {
      background: color-mix(in srgb, currentColor 8%, transparent);
    }
    .tab-row.active {
      background: color-mix(in srgb, #2f6fed 18%, transparent);
    }
    .favicon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      border-radius: 3px;
      object-fit: contain;
    }
    .favicon-fallback {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      border-radius: 3px;
      background: color-mix(in srgb, currentColor 15%, transparent);
    }
    .tab-text {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .tab-title {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 12.5px;
    }
    .tab-meta {
      font-size: 10.5px;
      color: color-mix(in srgb, currentColor 50%, transparent);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .badge {
      flex-shrink: 0;
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 8px;
      background: color-mix(in srgb, currentColor 10%, transparent);
      color: color-mix(in srgb, currentColor 65%, transparent);
    }
    .pin {
      flex-shrink: 0;
      font-size: 11px;
      opacity: 0.6;
    }
    .empty {
      padding: 24px 12px;
      text-align: center;
      color: color-mix(in srgb, currentColor 50%, transparent);
      font-size: 12px;
    }
    .err {
      padding: 12px;
      color: #d23b3b;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <header>
    <div class="title-row">
      <h1>Arc Tab Sorter</h1>
      <span class="meta" id="meta"></span>
    </div>
    <input type="search" id="search" placeholder="搜索 title / URL / 域名…" autofocus />
  </header>
  <div class="list" id="list">
    <div class="empty">加载中…</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
